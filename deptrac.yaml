deptrac:
  paths:
    - ./src
  layers:
    - name: Shared
      collectors:
        - type: directory
          value: src/Shared/.*
    - name: Machine
      collectors:
        - type: directory
          value: src/Machine/.*
    - name: WorkOrder
      collectors:
        - type: directory
          value: src/WorkOrder/.*
    - name: Framework
      collectors:
        - type: classNameRegex
          value: '#^(Illuminate|Symfony)\\#'
  ruleset:
    Shared: ~
    Machine:
      - Shared
    WorkOrder:
      - Shared
